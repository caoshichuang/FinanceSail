<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>封面图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1440px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
            color: white;
        }

        .date-badge {
            position: absolute;
            top: 60px;
            right: 60px;
            background: rgba(255, 255, 255, 0.2);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 24px;
            backdrop-filter: blur(10px);
        }

        .content {
            text-align: center;
            max-width: 900px;
        }

        .main-title {
            font-size: 72px;
            font-weight: bold;
            line-height: 1.3;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .sub-title {
            font-size: 36px;
            opacity: 0.9;
            line-height: 1.5;
        }

        .ai-badge {
            position: absolute;
            bottom: 60px;
            left: 60px;
            background: rgba(255, 255, 255, 0.2);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 20px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="date-badge" id="date">2026-03-28</div>

    <div class="content">
        <h1 class="main-title" id="mainTitle">A股收盘｜沪指涨1.23%</h1>
        <p class="sub-title" id="subTitle">成交额破万亿｜科技板块领跑</p>
    </div>

    <div class="ai-badge">AI辅助创作</div>
</body>
</html>
