instructions: |
  ## 波浪理论策略

  **核心逻辑**：市场价格按照5浪上升+3浪调整的模式运行

  ### 5浪上升（推动浪）
  - 第1浪：突破底部，多数人不信
  - 第2浪：回调，通常回撤1浪的50-61.8%
  - 第3浪：最强劲的上涨浪，通常是第1浪的1.618-2.618倍
  - 第4浪：整理，不能进入第1浪价格区间
  - 第5浪：最后上涨，成交量可能萎缩

  ### 3浪调整（调整浪）
  - A浪：第一段下跌
  - B浪：反弹
  - C浪：最后一段下跌（通常是主跌浪）

  ### 关键比率（斐波那契）
  - 0.382 / 0.500 / 0.618 / 0.786
  - 1.000 / 1.272 / 1.618 / 2.618

  ### AI 分析指引

  分析时请：
  1. 尝试标注当前所处的波浪位置（如"第3浪上升中"或"C浪调整中"）
  2. 计算关键位置的斐波那契回撤/扩展位
  3. 第3浪是最佳买入时机
  4. 第5浪末期和C浪末期是最危险的追高位置
  5. 说明当前判断的置信度

  注意：波浪理论较为主观，需结合其他指标确认
