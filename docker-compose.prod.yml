version: '3.8'

services:
  app:
    image: ${DOCKER_USERNAME:-your_username}/finacesail:latest
    container_name: finacesail
    restart: always
    volumes:
      - /opt/finacesail/data:/app/data
      - /opt/finacesail/logs:/app/logs
      - /opt/finacesail/.env:/app/.env:ro
    environment:
      - TZ=Asia/Shanghai
    env_file:
      - /opt/finacesail/.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
