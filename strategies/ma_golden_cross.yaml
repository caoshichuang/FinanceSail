name: ma_golden_cross
display_name: 均线金叉
description: 识别短期均线上穿长期均线的金叉买入信号
category: crossover
version: "1.0"
author: finance-sail

instructions: |
  ## 均线金叉策略

  **核心逻辑**：短期均线从下方穿越长期均线（金叉），代表趋势由空转多

  ### 金叉类型

  1. **MA5/MA10 金叉**（短线信号）
     - 适合短线操作，信号较频繁
     - 需配合成交量放大

  2. **MA10/MA20 金叉**（中线信号）
     - 趋势转折更可靠
     - 适合中线布局

  3. **MA20/MA60 金叉**（趋势确认）
     - 大趋势转变信号
     - 较为稳定但滞后

  ### 有效金叉条件

  1. **量价配合**
     - 金叉当日或次日成交量 > 5日均量
     - 价格站稳均线之上

  2. **位置判断**
     - 金叉发生在低位（距高点跌幅>20%）更可靠
     - 高位金叉（指数600以上）需谨慎

  3. **市场背景**
     - 大盘处于上升趋势中效果更佳
     - 板块处于景气周期

  ### 买入时机
  - 金叉确认后（收盘价确认）次日开盘低吸
  - 或金叉当日缩量确认后买入

  ### 止损规则
  - 死叉出现（短线均线下穿长线均线）
  - 跌破买入均线 2% 以上
