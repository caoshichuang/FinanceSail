name: bull_trend
display_name: 默认多头趋势
description: 识别多头排列、趋势延续与回踩低吸机会
category: trend
version: "1.0"
author: finance-sail
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend

instructions: |
  ## 默认多头趋势策略

  **核心逻辑**：寻找均线多头排列+回踩不破的低风险入场机会

  ### 分析框架

  1. **趋势确认**
     - MA5 >= MA10 >= MA20，且 MA20 斜率向上（多头排列）
     - 股价在 MA20 之上运行
     - 近期没有破位（收盘价跌破 MA20 连续2日）

  2. **位置与节奏**
     - 优先"回踩不破"而非"高位追涨"
     - 回踩 MA5/MA10 时量缩为佳
     - 不追涨停、不高位加仓

  3. **量价验证**
     - 突破日/反弹日是否放量（成交量>5日均量的120%）
     - 量缩回踩代表多头自信
     - 量价背离（价升量减）需警惕

  4. **买入条件（同时满足）**
     - 趋势评分 >= 60
     - 当前价格在 MA20 之上
     - 近3日量缩
     - 无明显顶背离信号

  5. **止损规则**
     - 止损价 = 最近低点 * 0.98
     - 跌破 MA20 且无法收复时离场
     - 单笔最大亏损不超过 3%

  6. **目标收益**
     - 第一目标：前高
     - 第二目标：前高 * 1.05
     - 分批止盈，不要一把梭
