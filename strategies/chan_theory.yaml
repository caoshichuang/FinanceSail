name: chan_theory
display_name: 缠论
description: 基于缠中说禅理论的顶底识别与买卖点判断
category: structure
version: "1.0"
author: finance-sail

instructions: |
  ## 缠论策略

  **核心逻辑**：通过分型、笔、线段和中枢的概念判断顶底结构

  ### 核心概念

  1. **顶底分型**
     - 顶分型：中间K线高点 > 左右两侧K线高点（且低点也更高）
     - 底分型：中间K线低点 < 左右两侧K线低点（且高点也更低）

  2. **笔**
     - 由顶分型到底分型（下降笔）
     - 由底分型到顶分型（上升笔）
     - 笔之间至少有一根独立K线

  3. **线段**
     - 至少3笔构成一个线段
     - 方向由第一笔决定

  4. **中枢**
     - 3笔以上的重叠区间
     - 进入中枢代表盘整
     - 突破中枢代表趋势延续

  ### 买点类型

  - **一买**：下跌趋势结束后的第一次反转（最安全）
  - **二买**：回调不破一买低点（风险收益比最佳）
  - **三买**：中枢突破后回踩不破中枢上沿

  ### AI 分析指引

  分析时请：
  1. 识别最近的底分型位置
  2. 判断当前处于笔/线段的第几级别
  3. 识别最近的中枢区间
  4. 给出当前处于第几类买点（或不存在买点）
  5. 止损设置在底分型低点之下
